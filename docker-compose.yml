services:
  db:
    container_name: postgres-lista-de-tarefas
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres 
    volumes:
      - pgdata:/var/lib/postgresql
      - ./init-db:/docker-entrypoint-initdb.d 
    ports:
      - "5432:5432"
    networks:
      - lista-de-tarefas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s 

  usuarios:
    build:
      context: ./lista-de-tarefas-usuarios
      dockerfile: Dockerfile
    container_name: usuarios
    ports:
      - "8081:8080"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME_USUARIOS=${DB_NAME_USUARIOS}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JPA_DDL_AUTO=${JPA_DDL_AUTO}
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lista-de-tarefas-network

  tarefas:
    build:
      context: ./lista-de-tarefas
      dockerfile: Dockerfile
    container_name: tarefas
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME_TAREFAS=${DB_NAME_TAREFAS}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - API_USUARIOS_URL=${API_USUARIOS_URL}
      - JPA_DDL_AUTO=${JPA_DDL_AUTO}
      - SPRING_RABBITMQ_HOST=${RABBITMQ_HOST}
      - SPRING_REDIS_HOST=${REDIS_HOST}
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - lista-de-tarefas-network

  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT}:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DB}
    volumes:
      - mongodata_v8:/data/db
    networks:
      - lista-de-tarefas-network

  notificacoes:
    build:
      context: ./lista-de-tarefas-notificacao
      dockerfile: Dockerfile
    container_name: notificacoes
    ports:
      - "8082:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB}?authSource=admin
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    depends_on:
      - rabbitmq
      - mongodb
    networks:
      - lista-de-tarefas-network

  rabbitmq:
      container_name: rabbitmq-broker
      image: rabbitmq:3.13-management
      restart: unless-stopped
      ports:
        - "5672:5672" 
        - "15672:15672" 
      networks:
        - lista-de-tarefas-network

  redis:
    image: redis:7-alpine
    container_name: redis-tarefas
    ports:
      - "6379:6379"
    networks:
      - lista-de-tarefas-network

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - lista-de-tarefas-network

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - lista-de-tarefas-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    depends_on:
      - loki
    networks:
      - lista-de-tarefas-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - lista-de-tarefas-network

networks:
  lista-de-tarefas-network:
    driver: bridge

volumes:
  pgdata:
  mongodata_v8:
