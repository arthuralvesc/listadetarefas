spring.application.name=lista-de-tarefas

spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME_TAREFAS:tarefas_db}
spring.datasource.username=${DB_USER:lista}
spring.datasource.password=${DB_PASSWORD:lista123}
spring.datasource.driver-class-name=org.postgresql.Driver

api.security.token.secret=${JWT_SECRET:listadetarefas2026listadetarefas2026listadetarefas2026}

api.usuario.url=${API_USUARIOS_URL:http://usuarios:8080}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.show_sql=true

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

spring.data.redis.host=${SPRING_REDIS_HOST:localhost}

management.server.port=9001
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

resilience4j.circuitbreaker.instances.lista-de-tarefas-usuarios.registerHealthIndicator=true

resilience4j.circuitbreaker.instances.lista-de-tarefas-usuarios.slidingWindowSize=10

resilience4j.circuitbreaker.instances.lista-de-tarefas-usuarios.minimumNumberOfCalls=5

resilience4j.circuitbreaker.instances.lista-de-tarefas-usuarios.failureRateThreshold=50

resilience4j.circuitbreaker.instances.lista-de-tarefas-usuarios.waitDurationInOpenState=20s

resilience4j.circuitbreaker.instances.lista-de-tarefas-usuarios.permittedNumberOfCallsInHalfOpenState=3

resilience4j.circuitbreaker.instances.lista-de-tarefas-usuarios.recordExceptions[0]=feign.RetryableException
resilience4j.circuitbreaker.instances.lista-de-tarefas-usuarios.recordExceptions[1]=feign.FeignException.InternalServerError
resilience4j.circuitbreaker.instances.lista-de-tarefas-usuarios.recordExceptions[2]=feign.FeignException.ServiceUnavailable

spring.datasource.hikari.maximum-pool-size=30

spring.threads.virtual.enabled=true
